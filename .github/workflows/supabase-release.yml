name: Supabase Release Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SURVEY_API_URL: ${{ vars.NEXT_PUBLIC_SURVEY_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Validate required configuration
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SURVEY_API_URL"
          url_ref="$(node -e "const host = new URL(process.env.SUPABASE_URL).host; console.log(host.split('.')[0]);")"
          project_ref="${SUPABASE_PROJECT_REF:-$url_ref}"
          if ! [[ "$project_ref" =~ ^[a-z0-9]{20}$ ]]; then
            project_ref="$url_ref"
          fi
          if [[ "$project_ref" != "$url_ref" ]]; then
            echo "Supabase project ref does not match SUPABASE_URL." >&2
            exit 1
          fi
          echo "PROJECT_REF=$project_ref" >> "$GITHUB_ENV"
          echo "SUPABASE_PROJECT_REF=$project_ref" >> "$GITHUB_ENV"

      - name: Link Supabase project
        run: supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply database migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD" --include-all

      - name: Configure Edge Function secrets
        run: |
          supabase secrets set \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --project-ref "$PROJECT_REF"

      - name: Deploy survey submit function
        run: supabase functions deploy survey-submit --project-ref "$PROJECT_REF"

      - name: Verify production storage path
        run: node scripts/verify-production-supabase.mjs

      - name: Upload production verification evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-storage-verification
          path: artifacts/qa/logs/production-storage-verification.json
          if-no-files-found: ignore
