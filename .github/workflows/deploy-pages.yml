name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://agentproofkr.github.io
      NEXT_PUBLIC_LANDING_VARIANT: v5.2
      NEXT_PUBLIC_SURVEY_API_URL: ${{ vars.NEXT_PUBLIC_SURVEY_API_URL }}
      LEGAL_OPERATOR_NAME: ${{ vars.LEGAL_OPERATOR_NAME }}
      PRIVACY_POLICY_VERSION: "2026-06-21"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        env:
          NEXT_PUBLIC_SURVEY_API_URL: ""
          NEXT_PUBLIC_SURVEY_API_MODE: disabled
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end test
        env:
          NEXT_PUBLIC_SURVEY_API_URL: ""
          NEXT_PUBLIC_SURVEY_API_MODE: disabled
        run: pnpm test:e2e

      - name: Build
        run: pnpm build

      - name: Content scan
        run: pnpm test:content

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
